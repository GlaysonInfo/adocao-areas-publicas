version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: adocao_pg
    environment:
      POSTGRES_USER: adocao
      POSTGRES_PASSWORD: adocao
      POSTGRES_DB: adocao
    ports:
      - "5432:5432"
    volumes:
      - adocao_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adocao -d adocao"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  adocao_pg: